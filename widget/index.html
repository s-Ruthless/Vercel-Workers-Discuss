<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VWD - 开发预览</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f8fa;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .config-panel {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .config-item {
      margin-bottom: 12px;
    }
    .config-item label {
      display: block;
      font-size: 13px;
      color: #6e7781;
      margin-bottom: 4px;
    }
    .config-item input,
    .config-item select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .config-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: #0969da;
      color: #fff;
    }
    .btn-secondary {
      background: #f6f8fa;
      color: #24292f;
      border: 1px solid #d0d7de;
    }
    .divider {
      height: 1px;
      background: #d0d7de;
      margin: 20px 0;
    }
    .demo-post h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .demo-post p {
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>VWD - 开发预览</h1>

    <div class="config-panel">
      <h3>配置面板</h3>
      <div class="config-item">
        <label>API 地址</label>
        <input type="text" id="apiBaseUrl" value="http://localhost:3000" />
      </div>
      <div class="config-item">
        <label>Site ID（可选，用于隔离不同站点/环境的评论）</label>
        <input type="text" id="siteId" placeholder="例如：blog、dev" />
      </div>
      <div class="config-item">
        <label>自定义 postSlug（可选，留空则使用当前路径）</label>
        <input type="text" id="postSlug" placeholder="例如：post-unique-id-001" />
      </div>
      <div class="config-item">
        <label>主题</label>
        <select id="theme">
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
      </div>
      <div class="config-actions">
        <button class="btn btn-primary" onclick="initWidget()">保存</button>
        <button class="btn btn-secondary" onclick="toggleTheme()">切换主题</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="demo-post">
      <h2>这是一篇示例文章</h2>
      <div id="vwd-page-pv">0</div>
      <p>
        这是一个演示 VWD Comments Widget 的示例页面。你可以在上方的配置面板中修改 API 地址和主题，
        然后点击"保存"按钮重新加载评论组件。
      </p>
    </div>

    <div class="divider"></div>

    <!-- 评论组件容器 -->
    <div id="comments"></div>
  </div>

  <script type="module" src="/src/dev.js"></script>
</body>
</html>
